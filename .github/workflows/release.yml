name: release

# Publishes the Okareo skills when a version tag (v*) is pushed.
#
# Required repository secret:
#   ANTHROPIC_API_KEY   API key for the workspace that owns the published
#                       Claude API skills. Add it under
#                       Settings -> Secrets and variables -> Actions.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # create the GitHub Release and attach assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skills
        run: python3 scripts/validate_skills.py

      - name: Build the .skill packages
        run: ./scripts/build.sh

      - name: Install the Anthropic CLI
        run: npm install -g @anthropic-ai/cli

      - name: Publish skills to the Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: ./scripts/release.sh
        # The tag already exists in CI; release.sh handles that gracefully
        # and proceeds with the Claude API upload, which is the goal here.

      - name: Commit updated skill-ids.json
        run: |
          if ! git diff --quiet skill-ids.json; then
            git config user.name  "okareo-release-bot"
            git config user.email "release-bot@okareo.com"
            git add skill-ids.json
            git commit -m "ci: record new Claude API skill ids"
            git push origin HEAD:main
          fi

      - name: Create the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
